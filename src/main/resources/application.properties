spring.application.name=Info-Evento
server.port=8080

# BASE DE DATOS
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mi_db?serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.MySQLDialect}

# MinIO
minio.url=${MINIO_URL:http://localhost:9000}
minio.url-publica=${MINIO_URL_PUBLIC:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=imagenes

# JWT
security.jwt.private.key=${PRIVATE_KEY}
security.jwt.user.generator=${USER_GENERATOR}

# Configuracion carga de imagenes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# SEGURIDAD
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration